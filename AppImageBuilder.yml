version: 1
script:
  - rm -rf AppDir/usr/share/time-tracker-gnome || true
  - mkdir -p AppDir/usr/share/time-tracker-gnome
  - cp main.py tracker.py store.py AppDir/usr/share/time-tracker-gnome/
  - chmod +x AppDir/usr/bin/time-tracker-gnome

AppDir:
  path: ./AppDir
  files:
    include: []
    exclude:
      - usr/share/doc/**
      - usr/share/man/**
      - usr/share/info/**
      - usr/share/lintian/**
      - usr/share/locale/**
  app_info:
    id: com.fletchi.TimeTrackerGnome
    name: Time Tracker
    icon: time-tracker-gnome
    version: 1.0.1
    exec: usr/bin/time-tracker-gnome
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libgtk-4-1
      - libadwaita-1-0
      - libcairo2
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libgdk-pixbuf-2.0-0
      - libglib2.0-0
      - libgirepository-1.0-1
    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme
      - adwaita-icon-theme

  runtime:
    env:
      PATH: "$APPDIR/usr/bin:$APPDIR/usr/sbin:$APPDIR/bin:$APPDIR/sbin:$PATH"
      APPDIR: "$APPDIR"
      LD_LIBRARY_PATH: "$APPDIR/usr/lib/x86_64-linux-gnu:$APPDIR/lib/x86_64-linux-gnu:$APPDIR/usr/lib:$APPDIR/lib"
      GI_TYPELIB_PATH: "$APPDIR/usr/lib/x86_64-linux-gnu/girepository-1.0"
      XDG_DATA_DIRS: "$APPDIR/usr/share:$XDG_DATA_DIRS"
      PYTHONHOME: "$APPDIR/usr"
      PYTHONPATH: "$APPDIR/usr/lib/python3/dist-packages:$APPDIR/usr/share/time-tracker-gnome"
      GSETTINGS_SCHEMA_DIR: "$APPDIR/usr/share/glib-2.0/schemas"
      GDK_PIXBUF_MODULE_FILE: "$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"

AppImage:
  arch: x86_64
  update-information: guess
  sign-key: None
